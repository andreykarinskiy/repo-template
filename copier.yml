# Конфигурация шаблона Copier
_answers_file: .copier-answers.yml

# Имя проекта
project_name:
  type: str
  help: "Имя проекта"

# Описание проекта
project_description:
  type: str
  help: "Описание проекта"

# Тэги проекта (разделитель - запятая)
project_tags:
  type: str
  help: "Тэги проекта (разделитель - запятая, может быть пустым)"
  default: ""

# Имя автора
author_name:
  type: str
  help: "Имя автора (можно получить из git config: git config user.name)"
  default: ""

# Email автора
author_email:
  type: str
  help: "Email автора (можно получить из git config: git config user.email)"
  default: ""

# Год копирайта
copyright_year:
  type: str
  help: "Год для копирайта"
  default: "2026"

# Организация (из PROFILE.yml)
organization:
  type: str
  help: "Название организации"
  default: "DEFAULT-ORG"

# Контактная информация (из PROFILE.yml)
contact_email:
  type: str
  help: "Email для контактов"
  default: "contact@mail.ru"

contact_telegram_id:
  type: str
  help: "Telegram ID для контактов"
  default: "@contact"

# Информация об авторе (из PROFILE.yml)
author_name_from_profile:
  type: str
  help: "Имя автора из профиля"
  default: "Andrey Karinskiy"

author_email_from_profile:
  type: str
  help: "Email автора из профиля"
  default: "a.karinskiy@mail.ru"