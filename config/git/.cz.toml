[tool.commitizen]
name = "cz_customize"
version = "0.1.0"

[tool.commitizen.customize]
message_template = "{{type}}{% if scope %}({{scope}}){% endif %}: {{subject}}\n\n{{body}}"
example = "feat(auth): Добавлена аутентификация через OAuth2"

schema = """
<тип>[(<область>)]: <заголовок>
<ПУСТАЯ СТРОКА>
<детальное описание>
"""

schema_pattern = "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\(\\w+\\))?!?: [А-ЯЁ].{1,49}$"

bump_pattern = "^(feat|fix|perf|refactor)"
bump_map = {"feat" = "MINOR", "fix" = "PATCH", "perf" = "PATCH", "refactor" = "PATCH"}

# Типы коммитов на русском
[[tool.commitizen.customize.questions]]
type = "list"
name = "type"
message = "Выберите тип изменения:"
choices = [
    {value = "feat", name = "feat: Новая функциональность"},
    {value = "fix", name = "fix: Исправление ошибки"},
    {value = "docs", name = "docs: Изменения в документации"},
    {value = "style", name = "style: Форматирование кода"},
    {value = "refactor", name = "refactor: Рефакторинг"},
    {value = "perf", name = "perf: Улучшение производительности"},
    {value = "test", name = "test: Добавление тестов"},
    {value = "build", name = "build: Изменения в сборке"},
    {value = "ci", name = "ci: Изменения в CI/CD"},
    {value = "chore", name = "chore: Рутинные задачи"},
    {value = "revert", name = "revert: Откат изменений"}
]

[[tool.commitizen.customize.questions]]
type = "input"
name = "subject"
message = "Краткое описание (макс. 50 символов, с заглавной буквы):"

[[tool.commitizen.customize.questions]]
type = "input"
name = "body"
message = "Детальное описание (опционально, макс. 120 символов на строку):"
